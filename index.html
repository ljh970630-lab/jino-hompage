<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>이진호</title>
  <style>
    body {
      margin: 0;
      padding: 60px 20px;
      background: #f4f4f4;
      font-family: Arial, sans-serif;
      text-align: center;
    }
    .card {
      max-width: 420px;
      margin: 0 auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }
    img {
      width: 280px;
      max-width: 100%;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 36px;
    }
    p {
      margin: 0;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="jinho.jpg" alt="이진호 사진">
    <h1>이진호</h1>
    <p>이진호의 홈페이지입니다.</p>
  </div>
</body>

</html>
